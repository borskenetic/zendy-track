<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANTAS | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body class="contact-page">

    <div class="watermark"></div>

   <header>
        <div class="logo-container">
            <img src="img/pantas-logo-landscape-10.png" alt="PANTAS Logo" class="logo">
        </div>
        <nav>
            <ul>
                
                <li><a href="/">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">OPAC</a></li>
                <li><a href="contact us.html">CONTACT US</a></li>
                <li><a href="#">ROOM RESERVATIONS</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-info-section">
            <h1 class="contact-title">CONTACT US</h1>
            <p class="contact-detail">inquiry@area51.ph</p>
            <p class="contact-detail">+6399177621021</p>
        </div>

        <section class="form-box">
            <p class="form-instruction">Fill out the form below and we will contact you as soon as possible</p>
            
            <form id="pantasContactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="tel" placeholder="Phone Number" required>
                <textarea placeholder="Message" rows="5" required></textarea>
                
                <div class="form-footer">
                    <button type="submit" class="send-btn">Send</button>
                </div>
            </form>
        </section>
    </main>


    

    

    <script src="script.js"></script>
</body>
</html>
